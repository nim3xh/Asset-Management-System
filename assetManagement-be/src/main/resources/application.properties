spring.application.name=assetManagement

# database configuration
spring.datasource.url=jdbc:mysql://localhost:3308/asset_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

# Server configuration
server.servlet.context-path=/asset-management

# version
version=v1

# CORS
app.cors.allowed-origins=http://localhost:5173

jwt.secret=assetManagementSecretKeyThatShouldBeAtLeast32CharactersLongForHS256AlgorithmSecurity